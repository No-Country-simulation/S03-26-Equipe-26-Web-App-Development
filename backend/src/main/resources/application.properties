spring.application.name=Smart_Traffic_Flow

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_traffic_flow
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8080

# Configuracoes do Banco H2
#spring.datasource.url=jdbc:h2:mem:smarttraffic;NON_KEYWORDS=DATABASE,TABLE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.hibernate.ddl-auto=create-drop

# Estrategia do Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl



# Logs e Console

#spring.jpa.properties.hibernate.format_sql=true
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# Performance
spring.jpa.open-in-view=false

#openweather

weather.api.key=${OPENWEATHER_API_KEY}
openweather.api.url=https://api.openweathermap.org/data/2.5/weather

sptrans
sptrans.token=${SPTRANS_TOKEN}
sptrans.api.url=http://api.olhovivo.sptrans.com.br/v2.1

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
api.security.token.secret=${jwt.secret}

# Google OAuth (usando vari�veis de ambiente - SEM valores reais no c�digo)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

# Configura��es do TomTom Traffic API
api.tomtom.base-url=https://api.tomtom.com/traffic/services/4
api.tomtom.key=${TOMTOM_API_KEY}

api.serper.key=${SERPER_API_KEY}
api.serper.base-url=https://google.serper.dev
